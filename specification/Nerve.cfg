\* TLC configuration for Nerve.tla
\* Small state space for model checking.

\* Minimal model — sufficient to demonstrate the new fingerprint
\* state-machine view (FingerprintAccountability) and the existing
\* invariants (DualCoverage, AsymmetricTrust, CriticalRestriction,
\* InhibitoryGating). Exhaustive checking with larger constants
\* exceeds available disk; expand carefully.
\* The model is now qualitative: trust and myelination are enums (see
\* TrustLevel / MyelinationLevel in Nerve.tla) rather than 0..100
\* integers. This reflects what the safety invariants actually depend
\* on (band membership, not the numeric value) and keeps TLC's state
\* space finite without losing fidelity. Production implementations
\* are free to use any numeric scale that maps onto the same bands.
CONSTANTS
    Agents = {a1, a2}
    Observers = {o1, o2}
    Channels = {c1}
    ChannelOwner <- ChannelOwnerFn
    MaxCascadeDepth = 2
    Fingerprints = {fp_alpha, fp_beta}
    \* Per-message confidence reduced to two qualitative cases:
    \* "below" (triggers refractory) and "above" (propagates).
    ConfidenceValues = {"below", "above"}

SPECIFICATION Spec

INVARIANTS
    Invariants

\* Liveness check (PruningLiveness) is intentionally omitted from the
\* default cfg. The expanded state space with fingerprint/rebaseline
\* variables exceeds 4 GB heap; reactivate by adding ``PROPERTIES
\* PruningLiveness`` and running TLC with ``-Xmx16g`` or larger.
