\* TLC configuration for Nerve.tla
\* Small state space for model checking.

CONSTANTS
    Agents = {a1, a2}
    Observers = {o1, o2, o3}
    Channels = {c1, c2}
    ChannelOwner = (c1 :> a1 @@ c2 :> a2)
    PruningThreshold = 20
    ReinforcementRate = 1
    DecayRate = 5
    MaxCascadeDepth = 3
    QualityThreshold = 70

SPECIFICATION Spec

INVARIANTS
    Invariants

PROPERTIES
    PruningLiveness
